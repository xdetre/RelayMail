version: "3.9"

services:
  db:
    image: postgres:16
    container_name: relaymail_db
    restart: always
    environment:
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: relay
      POSTGRES_DB: relaymail
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data


  backend:
    build: .
    container_name: relaymail_backend
    depends_on:
      - db
    env_file:
      - .env.local
    ports:
      - "8001:8000"
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: always


  frontend:
    image: node:20-alpine
    container_name: relaymail_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend
    restart: always

  migrate:
    build: .
    container_name: relaymail_migrate
    depends_on:
      - db
    env_file:
      - .env.local
    command: alembic upgrade head
    volumes:
      - .:/app

volumes:
  postgres_data:
