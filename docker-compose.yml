version: "3.9"

services:
  db:
    image: postgres:16
    container_name: relaymail_db
    restart: always
    environment:
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: relay
      POSTGRES_DB: relaymail
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: relaymail_backend
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+asyncpg://relay:relay@db:5432/relaymail
    ports:
      - "8001:8000"
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
